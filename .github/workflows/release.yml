name: Release

on:
  push:
    tags: ['v*']

# 同时需要 GitHub Pages 和 Release 的写权限
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci
      - run: npm run build

      # 打包 dist 用于 Release 下载
      - name: Package dist
        run: zip -r wordformatui-dist.zip dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: wordformatui-dist.zip
          generate_release_notes: true

      # 部署到 GitHub Pages
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
