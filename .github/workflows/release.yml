name: Release Desktop App

on:
  push:
    tags: [ "v*" ]

jobs:
  release:
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      matrix:
        os: [ windows-latest, macos-latest ]
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Install Node.js
        uses: actions/setup-node@v6.2.0
        with:
          node-version: 22.13.1
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Electron app
        run: npm run electron:build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # === 找到构建产物并上传到 Release ===
      - name: Locate bundle file
        id: find-bundle
        shell: bash
        run: |
          cd release
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            BUNDLE=$(find . -type f \( -name "*.exe" -o -name "*.msi" \) | head -n1)
          else  # macOS
            BUNDLE=$(find . -type f \( -name "*.dmg" -o -name "*.zip" \) ! -name "*-mac.zip" | head -n1)
          fi
          echo "bundle_path=release/$BUNDLE" >> $GITHUB_OUTPUT
          echo "Found: $BUNDLE"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2.5.0
        with:
          files: ${{ steps.find-bundle.outputs.bundle_path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
